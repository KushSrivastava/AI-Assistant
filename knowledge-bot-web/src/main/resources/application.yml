spring:
  application:
    name: knowledge-bot

  profiles:
    active: local

  # Enable Virtual Threads (Project Loom)
  threads:
    virtual:
      enabled: true

  ai:
    ollama:
      base-url: http://localhost:11434
      init:
        pull-model-strategy: when_missing
      chat:
        model: llama3.2:3b
        options:
          temperature: 0.2
      embedding:
        model: nomic-embed-text
    vectorstore:
      pgvector:
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 768
        table-name: global_knowledge_vectors
        schema-name: public
        initialize-schema: true

  # Datasource — defaults so the app doesn't crash if .env is missing
  datasource:
    url: jdbc:postgresql://localhost:5433/knowledgebot
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver

  h2:
    console:
      enabled: true

# Dynamic Model Routing Configuration
# WHY: Using a clean map structure so adding a new model only requires
# a new YAML entry — no Java code changes needed.
knowledge-bot:
  model-routing:
    default-model-key: local-fast
    fallback-model-key: local-fallback
    auto-failover: true
    request-timeout-ms: 30000
    models:
      local-fast:
        provider: OLLAMA
        model: llama3.2:3b
        min-complexity: SIMPLE
        max-complexity: SIMPLE
        cost: 0.0
        max-tokens: 32000
        context-window: 8192
        prompt-budget: 4000
        purpose: "Fast local responses, summaries, simple Q&A"
      local-code:
        provider: OLLAMA
        model: llama3.2:3b
        min-complexity: SIMPLE
        max-complexity: MODERATE
        cost: 0.0
        max-tokens: 32000
        context-window: 8192
        prompt-budget: 4000
        purpose: "Code generation & refactoring"
      local-fallback:
        provider: OLLAMA
        model: llama3.2:3b
        min-complexity: SIMPLE
        max-complexity: REASONING_HEAVY
        cost: 0.0
        max-tokens: 32000
        context-window: 8192
        prompt-budget: 4000
        purpose: "Fallback when primary local models are unavailable"
      advanced-reasoning:
        provider: OLLAMA
        model: llama3.2:3b
        min-complexity: COMPLEX
        max-complexity: REASONING_HEAVY
        cost: 0.0
        max-tokens: 32000
        context-window: 8192
        prompt-budget: 4000
        purpose: "Multi-step planning and reasoning"
      advanced-creative:
        provider: OLLAMA
        model: llama3.2:3b
        min-complexity: MODERATE
        max-complexity: REASONING_HEAVY
        cost: 0.0
        max-tokens: 32000
        context-window: 8192
        prompt-budget: 4000
        purpose: "Creative tasks and detailed analysis"

  notifications:
    discord-webhook: ${DISCORD_WEBHOOK_URL:}
    telegram-bot-token: ${TELEGRAM_BOT_TOKEN:}
    telegram-chat-id: ${TELEGRAM_CHAT_ID:}
    webhook-url: ${GENERIC_WEBHOOK_URL:}

  knowledge:
    base-path: ${KNOWLEDGE_BASE_PATH:${user.home}/.agentmanager/knowledge}
    watch-enabled: true
    supported-formats: pdf,docx,doc,txt,md,csv,json,xml,yaml,yml

# Logging configuration
logging:
  level:
    root: INFO
    org.springframework.ai: DEBUG
    com.knowledgebot.ai.model: DEBUG

server:
  error:
    include-message: always

threads:
  virtual:
    enabled: true