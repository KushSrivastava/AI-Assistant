spring:
  application:
    name: knowledge-bot

  profiles:
    active: local
  
  # Enable Virtual Threads (Project Loom)
  threads:
    virtual:
      enabled: true

  ai:
    ollama:
      base-url: http://localhost:11434
      init:
        pull-model-strategy: when_missing
      chat:
        model: llama3.2:3b
        options:
          temperature: 0.2
      embedding:
        model: nomic-embed-text
    vectorstore:
      pgvector:
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 768
        table-name: global_knowledge_vectors
        schema-name: public
        initialize-schema: true

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    
  h2:
    console:
      enabled: true

# Dynamic Model Routing Configuration
knowledge-bot:
  model-routing:
    default-model-key: local-fast
    fallback-model-key: local-fallback
    auto-failover: true
    request-timeout-ms: 30000
    local-fast-provider: OLLAMA
    local-fast-model: llama3.2:3b
    local-fast-min: SIMPLE
    local-fast-max: SIMPLE
    local-fast-cost: 0.0
    local-fast-tokens: 32000
    local-fast-purpose: "Fast local responses, summaries, simple Q&A"
    local-fast-context: 8192
    local-fast-budget: 4000
    local-code-provider: OLLAMA
    local-code-model: llama3.2:3b
    local-code-min: SIMPLE
    local-code-max: MODERATE
    local-code-cost: 0.0
    local-code-tokens: 32000
    local-code-purpose: "Fast local code assistance, refactoring"
    local-code-context: 8192
    local-code-budget: 4000
    local-fallback-provider: OLLAMA
    local-fallback-model: llama3.2:3b
    local-fallback-min: SIMPLE
    local-fallback-max: REASONING_HEAVY
    local-fallback-cost: 0.0
    local-fallback-tokens: 32000
    local-fallback-purpose: "Fallback when primary local models are unavailable"
    local-fallback-context: 8192
    local-fallback-budget: 4000
    advanced-reasoning-provider: OLLAMA
    advanced-reasoning-model: llama3.2:3b
    advanced-reasoning-min: COMPLEX
    advanced-reasoning-max: REASONING_HEAVY
    advanced-reasoning-cost: 0.0
    advanced-reasoning-tokens: 32000
    advanced-reasoning-purpose: "Multi-step planning and reasoning"
    advanced-reasoning-context: 8192
    advanced-reasoning-budget: 4000
    advanced-creative-provider: OLLAMA
    advanced-creative-model: llama3.2:3b
    advanced-creative-min: MODERATE
    advanced-creative-max: REASONING_HEAVY
    advanced-creative-cost: 0.0
    advanced-creative-tokens: 32000
    advanced-creative-purpose: "Creative tasks and detailed analysis"
    advanced-creative-context: 8192
    advanced-creative-budget: 4000
  notifications:
    discord-webhook: ${DISCORD_WEBHOOK_URL:}
    telegram-bot-token: ${TELEGRAM_BOT_TOKEN:}
    telegram-chat-id: ${TELEGRAM_CHAT_ID:}
    webhook-url: ${GENERIC_WEBHOOK_URL:}

# Logging configuration
logging:
  level:
    root: INFO
    org.springframework.ai: DEBUG
    com.knowledgebot.ai.model: DEBUG

server:
  error:
    include-message: always

threads:
  virtual:
    enabled: true